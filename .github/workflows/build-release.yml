name: Build and release solution

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.x

      - name: Install PAC CLI
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      # npm resolves package.json from the working directory, so cd into each
      # control rather than relying on --prefix.
      - name: Install Conversation Analyzer dependencies
        working-directory: src/controls/ConversationAnalyzer
        run: npm install

      - name: Install Routing Overview dependencies
        working-directory: src/controls/RoutingOverview
        run: npm install

      - name: Generate strong-name key
        shell: pwsh
        run: |
          $snk = "src/plugin/ConversationDiagnostics.Plugins/ConversationDiagnostics.snk"
          if (-not (Test-Path $snk)) {
            $rsa = [System.Security.Cryptography.RSACryptoServiceProvider]::new(1024)
            [System.IO.File]::WriteAllBytes($snk, $rsa.ExportCspBlob($true))
            $rsa.Dispose()
          }

      - name: Build plugin
        run: dotnet build src/plugin/ConversationDiagnostics.Plugins/ConversationDiagnostics.Plugins.csproj -c Release

      - name: Build solution
        run: dotnet build solution/ConversationDiagnostics.cdsproj -c Release

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item solution/bin/Release/*.zip out/
          Copy-Item src/plugin/ConversationDiagnostics.Plugins/bin/Release/net462/ConversationDiagnosticsPlugins.dll out/

      - uses: actions/upload-artifact@v6
        with:
          name: solutions
          path: out/*

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: out/*
          generate_release_notes: true
